<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>
</head>

<body bgcolor="AliceBlue">

<center>
    <h1>Student Registration Form</h1>
</center>
<hr>

<form action="submit.html" method="post">
<table style="width:80%;" border="3">

<tr>
<td><label>First Name:</label></td>
<td><input type="text" name="fname" placeholder="Enter Text" size="57"></td>
</tr>

<tr>
<td><label>Middle Name:</label></td>
<td><input type="text" name="mname" placeholder="Enter Text" size="57"></td>
</tr>

<tr>
<td><label>Last Name:</label></td>
<td><input type="text" name="lname" placeholder="Enter Text" size="57"></td>
</tr>

<tr>
<td><label>Address:</label></td>
<td><textarea name="address" rows="3" cols="52"></textarea></td>
</tr>

<tr>
<td><label>Mobile No:</label></td>
<td><input type="text" name="mobile" size="57" placeholder="XXXXXXXXXX"></td>
</tr>

<tr>
<td><label>College Name:</label></td>
<td><input type="text" name="college" size="57"></td>
</tr>

<tr>
<td><label>Branch Name:</label></td>
<td><input type="text" name="branch" size="57"></td>
</tr>

<tr>
<td><label>Technical Skills:</label></td>
<td>
    <input type="checkbox"> C<br>
    <input type="checkbox"> C++<br>
    <input type="checkbox"> Java<br>
    <input type="checkbox"> Python
</td>
</tr>

<tr>
<td colspan="2"  align="center">
    <input type="submit" value="Submit">
    <input type="reset" value="Clear">
</td>
</tr>

</table>
</form>

</body>
</html>
